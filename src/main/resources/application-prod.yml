# Railway production profile
# Set these environment variables in Railway Dashboard → Variables:
#   SUPABASE_DB_URL          → jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:5432/postgres?sslmode=require&prepareThreshold=0&connectTimeout=10&socketTimeout=30
#   SUPABASE_DB_USER         → postgres.<project-ref>
#   SUPABASE_DB_PASSWORD     → <db-password>
#   SUPABASE_JWKS_URI        → https://<project-ref>.supabase.co/auth/v1/.well-known/jwks.json
#   SUPABASE_URL             → https://<project-ref>.supabase.co
#   SUPABASE_ANON_KEY        → <anon-key>
#   SUPABASE_SERVICE_ROLE_KEY → <service-role-key>
#   CORS_ALLOWED_ORIGINS     → https://<frontend>.up.railway.app,https://<custom-domain>
spring:
  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 0
      initialization-fail-timeout: -1
      leak-detection-threshold: 0
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SUPABASE_JWKS_URI}
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    from: ${SMTP_FROM:noreply@ethoshub.com}
    from-name: ${SMTP_FROM_NAME:EthosHub}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

supabase:
  url: ${SUPABASE_URL}
  anon-key: ${SUPABASE_ANON_KEY}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

logging:
  level:
    root: WARN
    com.ethoshub: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    com.zaxxer.hikari: WARN
